<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - Food Calorie v3</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="login-shell">
      <section class="login-art">
        <nav class="login-nav">
          <a class="brand" href="./index.html">
            <span class="brand-mark"></span>
            <span>Food Calorie v3</span>
          </a>
          <div class="login-nav-links">
            <a href="./user.html">用户预览</a>
            <a href="./admin.html">后台预览</a>
          </div>
        </nav>

        <div class="login-copy reveal">
          <p class="eyebrow">Personal Nutrition Desk</p>
          <h1>把每天吃了什么，变成可理解的进度。</h1>
          <p>
            登录后进入个人营养工作台，查看今日摄入、餐次日志、目标进度、自定义 meal 和个人设置。
          </p>
        </div>

        <div class="floating-summary layer-card reveal delay-1">
          <div>
            <span class="muted">今日摄入</span>
            <strong>1,486 kcal</strong>
          </div>
          <div class="mini-ring" aria-hidden="true">
            <span>68%</span>
          </div>
        </div>
      </section>

      <section class="auth-panel layer-card reveal delay-2">
        <div class="auth-tabs">
          <button class="tab is-active" type="button">登录</button>
          <a class="tab" href="./register.html">注册</a>
        </div>

        <div class="section-heading compact">
          <p class="eyebrow">Secure Access</p>
          <h2>进入工作台</h2>
          <p>静态页面展示：不会发送任何请求。</p>
        </div>

        <form class="form-grid">
          <label>
            <span>用户名或邮箱</span>
            <input type="text" value="alice@example.com" />
            <small>支持 username 或 email 登录。</small>
          </label>
          <label>
            <span>密码</span>
            <input type="password" value="12345678" />
            <small>后续逻辑中接入登录限流与 JWT。</small>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" checked />
            <span>仅在当前会话保存登录状态</span>
          </label>
          <a class="button primary full" href="./user.html">进入用户工作台</a>
          <a class="button full" href="./admin.html">以管理员视角预览</a>
          <a class="button full" href="./register.html">没有账号，查看注册页</a>
        </form>

        <div class="auth-note">
          <strong>v3 账户能力</strong>
          <span>默认头像、头像上传、个人资料、密码修改、安全设置会在工作台中独立展示。</span>
        </div>
      </section>
    </main>
  </body>
</html>
